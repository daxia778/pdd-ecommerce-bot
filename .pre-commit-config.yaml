# ============================================================
#   Pre-commit Hooks — 提交前自动检查代码质量
#   安装: pip install pre-commit && pre-commit install
#   手动检查全部文件: pre-commit run --all-files
# ============================================================
repos:
  # ── Ruff: 超快 Python Linter + Formatter ──────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      # 先跑 Linter（自动修复可修复的问题）
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      # 再跑 Formatter（统一代码格式）
      - id: ruff-format
        types_or: [python, pyi]

  # ── 通用文件检查 ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # 去除行尾空格
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      # 确保文件以换行符结尾
      - id: end-of-file-fixer
      # 检测意外提交的大文件 (>500KB)
      - id: check-added-large-files
        args: [--maxkb=500]
      # 检测 YAML 语法
      - id: check-yaml
        args: [--allow-multiple-documents]
      # 检测 JSON 语法
      - id: check-json
      # 防止提交含有 merge conflict 标记的文件
      - id: check-merge-conflict
      # 防止直接提交到 main 分支（强制走 PR 流程）
      - id: no-commit-to-branch
        args: [--branch, main]

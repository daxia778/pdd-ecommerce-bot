# Slot Filling 追问提示（当检测到 PPT 关键词时追加到 system_prompt）
slot_filling_hint: |
  【重要流程：需求确认】
  客户似乎有PPT相关需求。请确认至少以下两个要素：
  1. 主题/内容 (Topic) — 必须明确
  2. 页数 (Pages) — 如客户只说'做一页'则 pages=1
  3. 风格 (Style) — 可选，如未提及可根据主题智能推断

  小单(1-3页)无需过度追问，主题明确即可触发。
  标准单需确认主题+页数+风格后触发。

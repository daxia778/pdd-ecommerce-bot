slot_filling_hint: |
  【内部系统提示】
  检测到PPT需求。请快速确认缺少的关键要素（【页数】、【用途】、【截止时间】），再去报价。
  如果客户只回复了数字，结合上下文将其理解为页数。注意：无论多简单，最低开机费是30元。

# ============================================================
#   CI 流水线 — Pull Request 自动质量检查
#   触发条件: 向 main 分支提交 PR 或直接 push
# ============================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 后端: Python 代码质量检查 ─────────────────────────────
  backend-lint:
    name: "🐍 Backend Lint"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linters
        run: pip install ruff mypy

      - name: Ruff Lint (代码规范检查)
        run: ruff check . --output-format=github

      - name: Ruff Format (格式一致性检查)
        run: ruff format --check .

      - name: Mypy (类型检查)
        run: mypy src/ config/ --ignore-missing-imports
        continue-on-error: true  # 渐进式引入，暂不阻断 PR

  # ── 后端: 测试（仅 3.11，安装完整依赖）─────────────────────
  backend-test:
    name: "🧪 Backend Test"
    runs-on: ubuntu-latest
    needs: backend-lint  # Lint 通过后才跑测试

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov

      - name: Run Tests with Coverage
        run: |
          python -m pytest tests/test_core.py tests/test_llm_client.py \
            -v --tb=short \
            --cov=src --cov=config \
            --cov-report=term-missing \
            --cov-report=html:coverage_html \
            --cov-fail-under=22
        env:
          DB_URL: "sqlite:///:memory:"
          ZHIPU_API_KEYS: "test-key-for-ci"
          LLM_PROVIDER: "zhipu"

      - name: Run Integration Tests (test_api.py)
        run: python -m pytest tests/test_api.py -v --tb=short
        env:
          DB_URL: "sqlite:///:memory:"
          ZHIPU_API_KEYS: "test-key-for-ci"
          LLM_PROVIDER: "zhipu"
        continue-on-error: true

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/
          retention-days: 7

  # ── 前端: Vue 3 构建检查 ─────────────────────────────────
  frontend:
    name: "🎨 Frontend Lint & Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint (代码规范检查)
        working-directory: frontend
        run: npx eslint src/ --ext .vue,.js,.ts --max-warnings=0
        continue-on-error: true  # 渐进式引入

      - name: Build (构建验证)
        working-directory: frontend
        run: npm run build

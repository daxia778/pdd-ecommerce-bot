# ============================================================
#   CI 流水线 — Pull Request 自动质量检查
#   触发条件: 向 main 分支提交 PR 或直接 push
#   Enterprise Hardening: 严格模式，阻断不合规代码
# ============================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 取消重复运行（同一 PR 的多次 push 只保留最新）
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 后端: Python 代码质量检查 ─────────────────────────────
  backend-lint:
    name: "🐍 Backend Lint"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linters
        run: pip install ruff==0.8.6 mypy

      - name: Ruff Lint (代码规范检查)
        run: ruff check . --output-format=github

      - name: Ruff Format (格式一致性检查)
        run: ruff format --check .

      - name: Mypy (类型检查)
        run: mypy src/ config/ --ignore-missing-imports
        continue-on-error: true  # 渐进式引入，暂不阻断 PR

  # ── 后端: 测试（Python 3.9，安装完整依赖）────────────────
  backend-test:
    name: "🧪 Backend Test"
    runs-on: ubuntu-latest
    needs: backend-lint  # Lint 通过后才跑测试

    # Enterprise: 使用 PostgreSQL Service Container 进行真实 DB 测试
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: pdd_test
          POSTGRES_USER: pdd_bot
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov

      - name: Run Tests with Coverage (SQLite - fast)
        run: |
          python -m pytest tests/test_core.py tests/test_llm_client.py \
            -v --tb=short \
            --cov=src --cov=config \
            --cov-report=term-missing \
            --cov-report=html:coverage_html \
            --cov-fail-under=15
        env:
          DB_URL: "sqlite:///:memory:"
          ZHIPU_API_KEYS: "test-key-for-ci"
          LLM_PROVIDER: "zhipu"
          ADMIN_PASSWORD: "ci-test-password-not-for-production"
          JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"

      - name: Run Tests (PostgreSQL - integration)
        run: |
          python -m pytest tests/test_core.py \
            -v --tb=short
        env:
          DB_URL: "postgresql://pdd_bot:test_password@localhost:5432/pdd_test"
          ZHIPU_API_KEYS: "test-key-for-ci"
          LLM_PROVIDER: "zhipu"
          ADMIN_PASSWORD: "ci-test-password-not-for-production"
          JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"

      - name: Run Integration Tests (test_api.py)
        run: python -m pytest tests/test_api.py -v --tb=short
        env:
          DB_URL: "sqlite:///:memory:"
          ZHIPU_API_KEYS: "test-key-for-ci"
          LLM_PROVIDER: "zhipu"
          ADMIN_PASSWORD: "ci-test-password-not-for-production"
          JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"
        continue-on-error: true

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/
          retention-days: 7

  # ── 安全扫描: 密钥泄露检测 ────────────────────────────────
  security-scan:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全量历史，深度扫描

      - name: Gitleaks (密钥泄露扫描)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # 渐进式引入

  # ── 前端: Vue 3 构建检查 ─────────────────────────────────
  frontend:
    name: "🎨 Frontend Lint & Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint (代码规范检查)
        working-directory: frontend
        run: npx eslint src/ --ext .vue,.js,.ts --max-warnings=0
        continue-on-error: true  # 渐进式引入

      - name: Build (构建验证)
        working-directory: frontend
        run: npm run build

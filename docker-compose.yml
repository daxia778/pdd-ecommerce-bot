# ============================================================
#   Docker Compose — PDD AI 智能客服完整运行环境
#   一键启动: docker compose up -d
# ============================================================

services:
  # ── 后端 API 服务 ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdd-bot-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8100}:8100"
    env_file:
      - .env
    environment:
      - DB_URL=sqlite:///./data/sqlite/pdd_ecommerce.db
      - CHROMA_DB_DIR=./data/chroma
    volumes:
      # 持久化数据：SQLite、ChromaDB、生成文件、日志
      - ./data/sqlite:/app/data/sqlite
      - ./data/chroma:/app/data/chroma
      - ./data/output:/app/data/output
      - ./logs:/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8100/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pdd-net

  # ── Redis 缓存（可选，用于 Session 缓存和队列）────────
  redis:
    image: redis:7-alpine
    container_name: pdd-bot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - pdd-net

  # ── 前端 Nginx（生产模式，serve Vue 构建产物）─────────
  frontend:
    image: nginx:alpine
    container_name: pdd-bot-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pdd-net

networks:
  pdd-net:
    driver: bridge

volumes:
  redis-data:
